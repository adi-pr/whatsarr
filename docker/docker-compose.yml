# Simple docker-compose file for Sonarr

version: "3.9"

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr_test
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Guyana
    volumes:
      - ./volumes/sonarr/config:/config
      - ./volumes/sonarr/tv:/tv
      - ./volumes/sonarr/downloads:/downloads
    ports:
      - 8989:8989
    restart: unless-stopped